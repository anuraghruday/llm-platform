apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: llm-platform-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-platform-api
  template:
    metadata:
      labels:
        app: llm-platform-api
    spec:
      containers:
        - name: api
          image: llm-platform-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-platform-secrets
                  key: anthropic-api-key
            - name: CHROMA_DB_PATH
              value: /data/chroma
            - name: VLLM_URL
              value: http://vllm-service:8001
            - name: REDIS_URL
              value: redis://redis-service:6379
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: chroma-storage
              mountPath: /data/chroma
      volumes:
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: chroma-pvc
